# =============================================================================
# Food City — Production Docker Compose
# =============================================================================
# Differences from docker-compose.yml (dev):
# - Backend uses production image (distroless, no cargo-watch)
# - Frontend uses nginx (no Vite dev server)
# - No source-code volume mounts
# - Restart policies
# - Resource limits
# =============================================================================

services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: foodcity-postgres-prod
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    deploy:
      resources:
        limits:
          memory: 2G

  redis:
    image: redis:7-alpine
    container_name: foodcity-redis-prod
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: always

  backend:
    image: food-city-backend:latest
    container_name: foodcity-backend-prod
    environment:
      APP_ENV: production
      APP_PORT: 8080
      APP_HOST: 0.0.0.0
      APP_LOG_LEVEL: info,food_city_backend=info,sqlx=warn
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      DATABASE_MAX_CONNECTIONS: 30
      DATABASE_ACQUIRE_TIMEOUT_SECS: 5
      REDIS_URL: redis://redis:6379/0
      REDIS_POOL_SIZE: 32
      JWT_SECRET: ${JWT_SECRET}
      JWT_ISSUER: food-city
      JWT_AUDIENCE: food-city-client
      JWT_ACCESS_TTL_SECS: 900
      JWT_REFRESH_TTL_SECS: 604800
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      STRIPE_CONNECT_CLIENT_ID: ${STRIPE_CONNECT_CLIENT_ID}
      RATE_LIMIT_ENABLED: "true"
      RATE_LIMIT_REDIS_URL: redis://redis:6379/1
      GEOCODER_PROVIDER: nominatim
      GEOCODER_API_URL: https://nominatim.openstreetmap.org
      FEATURE_REALTIME_WS: "true"
      FEATURE_DRIVER_MATCHING: "true"
      FEATURE_LOYALTY: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8080:8080"
    restart: always
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M

  frontend:
    image: food-city-frontend:latest
    container_name: foodcity-frontend-prod
    depends_on:
      - backend
    ports:
      - "80:80"
    restart: always
    deploy:
      resources:
        limits:
          memory: 128M

volumes:
  postgres_data:
  redis_data:
